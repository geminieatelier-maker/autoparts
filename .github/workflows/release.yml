name: Release

# Se déclenche uniquement quand un tag de version (v1.0.3, v1.1.0, ...) est poussé.
# Construit l'installeur Windows et le publie automatiquement sur GitHub Releases,
# ce qui permet à l'application installée chez le client de se mettre à jour toute seule.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm ci

      - name: Restaurer la clé API Groq (module IA)
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            printf "module.exports = '%s';\n" "$GROQ_API_KEY" > electron/groq-key.local.cjs
          else
            echo "GROQ_API_KEY absent (secret non configuré) — le module IA sera désactivé dans ce build."
          fi

      - name: Build + publication sur GitHub Releases
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
